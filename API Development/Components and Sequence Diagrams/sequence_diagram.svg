<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
      .actor { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; text-anchor: middle; }
      .message { font-family: Arial, sans-serif; font-size: 10px; }
      .lifeline { stroke: #333; stroke-width: 2; stroke-dasharray: 5,5; }
      .activation { fill: #e6f3ff; stroke: #0066cc; stroke-width: 2; }
      .arrow { stroke: #0066cc; stroke-width: 2; marker-end: url(#arrowhead); }
      .return-arrow { stroke: #666; stroke-width: 1; stroke-dasharray: 3,3; marker-end: url(#arrowhead-return); }
      .note { fill: #fffacd; stroke: #ddd; stroke-width: 1; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0066cc" />
    </marker>
    <marker id="arrowhead-return" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="600" y="25" class="title">Youth Account Management System - Sequence Diagram</text>
  
  <!-- Actors and Systems -->
  <g id="actors">
    <!-- Parent User -->
    <rect x="50" y="50" width="80" height="40" fill="#f0f8ff" stroke="#0066cc" stroke-width="2" rx="5"/>
    <text x="90" y="75" class="actor">Parent User</text>
    
    <!-- Web App -->
    <rect x="180" y="50" width="80" height="40" fill="#f0f8ff" stroke="#0066cc" stroke-width="2" rx="5"/>
    <text x="220" y="75" class="actor">Web App</text>
    
    <!-- API Gateway -->
    <rect x="310" y="50" width="80" height="40" fill="#f0f8ff" stroke="#0066cc" stroke-width="2" rx="5"/>
    <text x="350" y="75" class="actor">API Gateway</text>
    
    <!-- Auth Service -->
    <rect x="440" y="50" width="80" height="40" fill="#f0f8ff" stroke="#0066cc" stroke-width="2" rx="5"/>
    <text x="480" y="75" class="actor">Auth Service</text>
    
    <!-- Youth API -->
    <rect x="570" y="50" width="80" height="40" fill="#f0f8ff" stroke="#0066cc" stroke-width="2" rx="5"/>
    <text x="610" y="75" class="actor">Youth API</text>
    
    <!-- Database -->
    <rect x="700" y="50" width="80" height="40" fill="#f0f8ff" stroke="#0066cc" stroke-width="2" rx="5"/>
    <text x="740" y="75" class="actor">Database</text>
    
    <!-- Core Banking -->
    <rect x="830" y="50" width="80" height="40" fill="#f0f8ff" stroke="#0066cc" stroke-width="2" rx="5"/>
    <text x="870" y="75" class="actor">Core Banking</text>
    
    <!-- Payment Service -->
    <rect x="960" y="50" width="80" height="40" fill="#f0f8ff" stroke="#0066cc" stroke-width="2" rx="5"/>
    <text x="1000" y="75" class="actor">Payment Svc</text>
  </g>
  
  <!-- Lifelines -->
  <g id="lifelines">
    <line x1="90" y1="90" x2="90" y2="750" class="lifeline"/>
    <line x1="220" y1="90" x2="220" y2="750" class="lifeline"/>
    <line x1="350" y1="90" x2="350" y2="750" class="lifeline"/>
    <line x1="480" y1="90" x2="480" y2="750" class="lifeline"/>
    <line x1="610" y1="90" x2="610" y2="750" class="lifeline"/>
    <line x1="740" y1="90" x2="740" y2="750" class="lifeline"/>
    <line x1="870" y1="90" x2="870" y2="750" class="lifeline"/>
    <line x1="1000" y1="90" x2="1000" y2="750" class="lifeline"/>
  </g>
  
  <!-- Sequence Flow -->
  <g id="sequence">
    <!-- 1. Login Request -->
    <line x1="90" y1="120" x2="220" y2="120" class="arrow"/>
    <text x="155" y="115" class="message">1. Login Request</text>
    
    <!-- 2. OAuth Authentication -->
    <line x1="220" y1="140" x2="350" y2="140" class="arrow"/>
    <text x="285" y="135" class="message">2. OAuth Token Request</text>
    
    <!-- 3. Validate Credentials -->
    <line x1="350" y1="160" x2="480" y2="160" class="arrow"/>
    <text x="415" y="155" class="message">3. Validate Credentials</text>
    
    <!-- 4. Return Token -->
    <line x1="480" y1="180" x2="350" y2="180" class="return-arrow"/>
    <text x="415" y="175" class="message">4. JWT Token</text>
    
    <!-- 5. Token Response -->
    <line x1="350" y1="200" x2="220" y2="200" class="return-arrow"/>
    <text x="285" y="195" class="message">5. Auth Response</text>
    
    <!-- 6. Dashboard Request -->
    <line x1="90" y1="240" x2="220" y2="240" class="arrow"/>
    <text x="155" y="235" class="message">6. Get Dashboard</text>
    
    <!-- 7. API Call with Token -->
    <line x1="220" y1="260" x2="350" y2="260" class="arrow"/>
    <text x="285" y="255" class="message">7. GET /dashboard + Bearer Token</text>
    
    <!-- 8. Validate Token -->
    <line x1="350" y1="280" x2="480" y2="280" class="arrow"/>
    <text x="415" y="275" class="message">8. Validate Token</text>
    
    <!-- 9. Token Valid -->
    <line x1="480" y1="300" x2="350" y2="300" class="return-arrow"/>
    <text x="415" y="295" class="message">9. Token Valid</text>
    
    <!-- 10. Route to Youth API -->
    <line x1="350" y1="320" x2="610" y2="320" class="arrow"/>
    <text x="480" y="315" class="message">10. Dashboard Request</text>
    
    <!-- Activation Box for Youth API -->
    <rect x="605" y="320" width="10" height="200" class="activation"/>
    
    <!-- 11. Get Account Data -->
    <line x1="610" y1="340" x2="740" y2="340" class="arrow"/>
    <text x="675" y="335" class="message">11. Query Account Info</text>
    
    <!-- 12. Account Data -->
    <line x1="740" y1="360" x2="610" y2="360" class="return-arrow"/>
    <text x="675" y="355" class="message">12. Account Details</text>
    
    <!-- 13. Get Balance -->
    <line x1="610" y1="380" x2="870" y2="380" class="arrow"/>
    <text x="740" y="375" class="message">13. Get Balance</text>
    
    <!-- 14. Balance Response -->
    <line x1="870" y1="400" x2="610" y2="400" class="return-arrow"/>
    <text x="740" y="395" class="message">14. Current Balance</text>
    
    <!-- 15. Get Transactions -->
    <line x1="610" y1="420" x2="740" y2="420" class="arrow"/>
    <text x="675" y="415" class="message">15. Recent Transactions</text>
    
    <!-- 16. Transaction Data -->
    <line x1="740" y1="440" x2="610" y2="440" class="return-arrow"/>
    <text x="675" y="435" class="message">16. Transaction List</text>
    
    <!-- 17. Dashboard Response -->
    <line x1="610" y1="480" x2="350" y2="480" class="return-arrow"/>
    <text x="480" y="475" class="message">17. Dashboard Data</text>
    
    <!-- 18. API Response -->
    <line x1="350" y1="500" x2="220" y2="500" class="return-arrow"/>
    <text x="285" y="495" class="message">18. JSON Response</text>
    
    <!-- 19. Display Dashboard -->
    <line x1="220" y1="520" x2="90" y2="520" class="return-arrow"/>
    <text x="155" y="515" class="message">19. Dashboard UI</text>
    
    <!-- Fund Transfer Flow -->
    <text x="600" y="560" class="title" style="font-size: 14px;">Fund Transfer Flow</text>
    
    <!-- 20. Transfer Request -->
    <line x1="90" y1="580" x2="220" y2="580" class="arrow"/>
    <text x="155" y="575" class="message">20. Transfer Funds</text>
    
    <!-- 21. API Call -->
    <line x1="220" y1="600" x2="610" y2="600" class="arrow"/>
    <text x="415" y="595" class="message">21. POST /fund-transfer</text>
    
    <!-- Activation Box for Transfer -->
    <rect x="605" y="600" width="10" height="120" class="activation"/>
    
    <!-- 22. Validate Transfer -->
    <line x1="610" y1="620" x2="740" y2="620" class="arrow"/>
    <text x="675" y="615" class="message">22. Validate Account</text>
    
    <!-- 23. Process Transfer -->
    <line x1="610" y1="640" x2="1000" y2="640" class="arrow"/>
    <text x="805" y="635" class="message">23. Execute Transfer</text>
    
    <!-- 24. Transfer Complete -->
    <line x1="1000" y1="660" x2="610" y2="660" class="return-arrow"/>
    <text x="805" y="655" class="message">24. Transfer Success</text>
    
    <!-- 25. Update Database -->
    <line x1="610" y1="680" x2="740" y2="680" class="arrow"/>
    <text x="675" y="675" class="message">25. Update Balance</text>
    
    <!-- 26. Confirmation -->
    <line x1="610" y1="720" x2="220" y2="720" class="return-arrow"/>
    <text x="415" y="715" class="message">26. Transfer Confirmation</text>
    
    <!-- 27. Success Message -->
    <line x1="220" y1="740" x2="90" y2="740" class="return-arrow"/>
    <text x="155" y="735" class="message">27. Success Notification</text>
  </g>
  
  <!-- Notes -->
  <g id="notes">
    <rect x="50" y="770" width="300" height="25" class="note"/>
    <text x="55" y="785" class="message">Note: All API calls include OAuth 2.0 Bearer token authentication</text>
    
    <rect x="400" y="770" width="350" height="25" class="note"/>
    <text x="405" y="785" class="message">Security: TLS 1.3 encryption for all communications, audit logging enabled</text>
  </g>
</svg>