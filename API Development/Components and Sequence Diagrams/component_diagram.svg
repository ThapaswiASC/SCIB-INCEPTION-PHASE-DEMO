<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
      .component-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
      .component-text { font-family: Arial, sans-serif; font-size: 11px; text-anchor: middle; }
      .interface-text { font-family: Arial, sans-serif; font-size: 9px; }
      .layer-title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; }
      .connection { stroke: #0066cc; stroke-width: 2; marker-end: url(#arrowhead); }
      .bidirectional { stroke: #0066cc; stroke-width: 2; marker-end: url(#arrowhead); marker-start: url(#arrowhead); }
      .data-flow { stroke: #cc6600; stroke-width: 2; stroke-dasharray: 5,5; marker-end: url(#arrowhead-data); }
      .presentation-layer { fill: #e6f3ff; stroke: #0066cc; stroke-width: 2; }
      .business-layer { fill: #f0f8e6; stroke: #66cc00; stroke-width: 2; }
      .data-layer { fill: #ffe6f3; stroke: #cc0066; stroke-width: 2; }
      .external-system { fill: #fff0e6; stroke: #ff6600; stroke-width: 2; }
      .security-component { fill: #f5f5dc; stroke: #8b4513; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0066cc" />
    </marker>
    <marker id="arrowhead-data" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cc6600" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="700" y="30" class="title">Youth Account Management System - Component Diagram</text>
  
  <!-- Layer Labels -->
  <text x="50" y="80" class="layer-title">Presentation Layer</text>
  <text x="50" y="280" class="layer-title">API Gateway Layer</text>
  <text x="50" y="380" class="layer-title">Business Logic Layer</text>
  <text x="50" y="680" class="layer-title">Data Layer</text>
  <text x="50" y="850" class="layer-title">External Systems</text>
  
  <!-- Presentation Layer -->
  <g id="presentation-layer">
    <!-- Web Application -->
    <rect x="200" y="100" width="200" height="120" class="presentation-layer" rx="10"/>
    <text x="300" y="125" class="component-title">Web Application</text>
    <text x="300" y="145" class="component-text">React/Angular SPA</text>
    <text x="300" y="160" class="component-text">• Dashboard UI (SCIB-195)</text>
    <text x="300" y="175" class="component-text">• Fund Transfer UI (SCIB-194)</text>
    <text x="300" y="190" class="component-text">• Spending Limit UI (SCIB-196)</text>
    <text x="300" y="205" class="component-text">• Activity View UI (SCIB-197)</text>
    
    <!-- Mobile Application -->
    <rect x="450" y="100" width="200" height="120" class="presentation-layer" rx="10"/>
    <text x="550" y="125" class="component-title">Mobile Application</text>
    <text x="550" y="145" class="component-text">Native iOS/Android</text>
    <text x="550" y="160" class="component-text">• Youth Account Access</text>
    <text x="550" y="175" class="component-text">• Transaction Viewing</text>
    <text x="550" y="190" class="component-text">• Push Notifications</text>
    <text x="550" y="205" class="component-text">• Biometric Authentication</text>
  </g>
  
  <!-- Security Layer -->
  <g id="security-layer">
    <!-- Authentication Service -->
    <rect x="800" y="100" width="180" height="100" class="security-component" rx="10"/>
    <text x="890" y="125" class="component-title">Authentication Service</text>
    <text x="890" y="145" class="component-text">OAuth 2.0 Provider</text>
    <text x="890" y="160" class="component-text">• JWT Token Management</text>
    <text x="890" y="175" class="component-text">• Multi-Factor Auth</text>
    <text x="890" y="190" class="component-text">• Session Management</text>
    
    <!-- Authorization Service -->
    <rect x="1020" y="100" width="180" height="100" class="security-component" rx="10"/>
    <text x="1110" y="125" class="component-title">Authorization Service</text>
    <text x="1110" y="145" class="component-text">RBAC Engine</text>
    <text x="1110" y="160" class="component-text">• Role Management</text>
    <text x="1110" y="175" class="component-text">• Permission Checks</text>
    <text x="1110" y="190" class="component-text">• Access Control</text>
  </g>
  
  <!-- API Gateway Layer -->
  <g id="api-gateway">
    <rect x="200" y="300" width="800" height="60" class="business-layer" rx="10"/>
    <text x="600" y="325" class="component-title">API Gateway (Kong/AWS API Gateway)</text>
    <text x="300" y="345" class="component-text">• Rate Limiting</text>
    <text x="450" y="345" class="component-text">• Request Routing</text>
    <text x="600" y="345" class="component-text">• Load Balancing</text>
    <text x="750" y="345" class="component-text">• Security Policies</text>
    <text x="900" y="345" class="component-text">• API Versioning</text>
  </g>
  
  <!-- Business Logic Layer -->
  <g id="business-layer">
    <!-- Dashboard Service -->
    <rect x="150" y="400" width="180" height="120" class="business-layer" rx="10"/>
    <text x="240" y="425" class="component-title">Dashboard Service</text>
    <text x="240" y="445" class="component-text">SCIB-26 Implementation</text>
    <text x="240" y="460" class="component-text">• Account Summary</text>
    <text x="240" y="475" class="component-text">• Balance Aggregation</text>
    <text x="240" y="490" class="component-text">• Recent Transactions</text>
    <text x="240" y="505" class="component-text">• Spending Analytics</text>
    
    <!-- Fund Transfer Service -->
    <rect x="350" y="400" width="180" height="120" class="business-layer" rx="10"/>
    <text x="440" y="425" class="component-title">Fund Transfer Service</text>
    <text x="440" y="445" class="component-text">SCIB-27 Implementation</text>
    <text x="440" y="460" class="component-text">• Transfer Validation</text>
    <text x="440" y="475" class="component-text">• Balance Verification</text>
    <text x="440" y="490" class="component-text">• Transaction Processing</text>
    <text x="440" y="505" class="component-text">• Audit Logging</text>
    
    <!-- Spending Limit Service -->
    <rect x="550" y="400" width="180" height="120" class="business-layer" rx="10"/>
    <text x="640" y="425" class="component-title">Spending Limit Service</text>
    <text x="640" y="445" class="component-text">SCIB-28 Implementation</text>
    <text x="640" y="460" class="component-text">• Limit Configuration</text>
    <text x="640" y="475" class="component-text">• Limit Enforcement</text>
    <text x="640" y="490" class="component-text">• Notification Triggers</text>
    <text x="640" y="505" class="component-text">• Policy Management</text>
    
    <!-- Transaction History Service -->
    <rect x="750" y="400" width="180" height="120" class="business-layer" rx="10"/>
    <text x="840" y="425" class="component-title">Transaction History Service</text>
    <text x="840" y="445" class="component-text">SCIB-29 Implementation</text>
    <text x="840" y="460" class="component-text">• Transaction Retrieval</text>
    <text x="840" y="475" class="component-text">• Filtering & Pagination</text>
    <text x="840" y="490" class="component-text">• Search Capabilities</text>
    <text x="840" y="505" class="component-text">• Export Functions</text>
    
    <!-- Account Management Service -->
    <rect x="950" y="400" width="180" height="120" class="business-layer" rx="10"/>
    <text x="1040" y="425" class="component-title">Account Management</text>
    <text x="1040" y="445" class="component-text">Account Operations</text>
    <text x="1040" y="460" class="component-text">• Account Status</text>
    <text x="1040" y="475" class="component-text">• Profile Management</text>
    <text x="1040" y="490" class="component-text">• Settings Configuration</text>
    <text x="1040" y="505" class="component-text">• Relationship Mapping</text>
  </g>
  
  <!-- Shared Services -->
  <g id="shared-services">
    <!-- Notification Service -->
    <rect x="200" y="550" width="150" height="80" class="business-layer" rx="10"/>
    <text x="275" y="575" class="component-title">Notification Service</text>
    <text x="275" y="595" class="component-text">• Email Alerts</text>
    <text x="275" y="610" class="component-text">• SMS Notifications</text>
    <text x="275" y="625" class="component-text">• Push Messages</text>
    
    <!-- Audit Service -->
    <rect x="370" y="550" width="150" height="80" class="business-layer" rx="10"/>
    <text x="445" y="575" class="component-title">Audit Service</text>
    <text x="445" y="595" class="component-text">• Activity Logging</text>
    <text x="445" y="610" class="component-text">• Compliance Tracking</text>
    <text x="445" y="625" class="component-text">• Report Generation</text>
    
    <!-- Cache Service -->
    <rect x="540" y="550" width="150" height="80" class="business-layer" rx="10"/>
    <text x="615" y="575" class="component-title">Cache Service</text>
    <text x="615" y="595" class="component-text">Redis Cluster</text>
    <text x="615" y="610" class="component-text">• Session Storage</text>
    <text x="615" y="625" class="component-text">• Data Caching</text>
    
    <!-- Configuration Service -->
    <rect x="710" y="550" width="150" height="80" class="business-layer" rx="10"/>
    <text x="785" y="575" class="component-title">Configuration Service</text>
    <text x="785" y="595" class="component-text">• Environment Config</text>
    <text x="785" y="610" class="component-text">• Feature Flags</text>
    <text x="785" y="625" class="component-text">• Dynamic Settings</text>
  </g>
  
  <!-- Data Layer -->
  <g id="data-layer">
    <!-- Primary Database -->
    <rect x="200" y="700" width="200" height="100" class="data-layer" rx="10"/>
    <text x="300" y="725" class="component-title">Primary Database</text>
    <text x="300" y="745" class="component-text">PostgreSQL Cluster</text>
    <text x="300" y="760" class="component-text">• Youth Account Data</text>
    <text x="300" y="775" class="component-text">• Transaction Records</text>
    <text x="300" y="790" class="component-text">• Configuration Settings</text>
    
    <!-- Read Replica -->
    <rect x="420" y="700" width="180" height="100" class="data-layer" rx="10"/>
    <text x="510" y="725" class="component-title">Read Replica</text>
    <text x="510" y="745" class="component-text">PostgreSQL Read-Only</text>
    <text x="510" y="760" class="component-text">• Query Optimization</text>
    <text x="510" y="775" class="component-text">• Reporting Queries</text>
    <text x="510" y="790" class="component-text">• Analytics Support</text>
    
    <!-- Audit Database -->
    <rect x="620" y="700" width="180" height="100" class="data-layer" rx="10"/>
    <text x="710" y="725" class="component-title">Audit Database</text>
    <text x="710" y="745" class="component-text">Immutable Ledger</text>
    <text x="710" y="760" class="component-text">• Audit Logs</text>
    <text x="710" y="775" class="component-text">• Compliance Records</text>
    <text x="710" y="790" class="component-text">• Security Events</text>
    
    <!-- File Storage -->
    <rect x="820" y="700" width="180" height="100" class="data-layer" rx="10"/>
    <text x="910" y="725" class="component-title">File Storage</text>
    <text x="910" y="745" class="component-text">S3/Object Storage</text>
    <text x="910" y="760" class="component-text">• Document Storage</text>
    <text x="910" y="775" class="component-text">• Backup Archives</text>
    <text x="910" y="790" class="component-text">• Static Assets</text>
  </g>
  
  <!-- External Systems -->
  <g id="external-systems">
    <!-- Core Banking System -->
    <rect x="200" y="870" width="200" height="80" class="external-system" rx="10"/>
    <text x="300" y="895" class="component-title">Core Banking System</text>
    <text x="300" y="915" class="component-text">• Account Operations</text>
    <text x="300" y="930" class="component-text">• Balance Inquiries</text>
    <text x="300" y="945" class="component-text">• Transaction Validation</text>
    
    <!-- Payment Service -->
    <rect x="420" y="870" width="180" height="80" class="external-system" rx="10"/>
    <text x="510" y="895" class="component-title">Payment Service</text>
    <text x="510" y="915" class="component-text">• Internal Transfers</text>
    <text x="510" y="930" class="component-text">• Transaction Processing</text>
    <text x="510" y="945" class="component-text">• Settlement</text>
    
    <!-- Fraud Detection -->
    <rect x="620" y="870" width="180" height="80" class="external-system" rx="10"/>
    <text x="710" y="895" class="component-title">Fraud Detection</text>
    <text x="710" y="915" class="component-text">• Risk Assessment</text>
    <text x="710" y="930" class="component-text">• Pattern Analysis</text>
    <text x="710" y="945" class="component-text">• Real-time Monitoring</text>
    
    <!-- Regulatory Reporting -->
    <rect x="820" y="870" width="180" height="80" class="external-system" rx="10"/>
    <text x="910" y="895" class="component-title">Regulatory Reporting</text>
    <text x="910" y="915" class="component-text">• Compliance Reports</text>
    <text x="910" y="930" class="component-text">• Audit Submissions</text>
    <text x="910" y="945" class="component-text">• Data Export</text>
  </g>
  
  <!-- Connections -->
  <g id="connections">
    <!-- Presentation to API Gateway -->
    <line x1="300" y1="220" x2="300" y2="300" class="connection"/>
    <line x1="550" y1="220" x2="550" y2="300" class="connection"/>
    
    <!-- API Gateway to Services -->
    <line x1="300" y1="360" x2="240" y2="400" class="connection"/>
    <line x1="400" y1="360" x2="440" y2="400" class="connection"/>
    <line x1="500" y1="360" x2="640" y2="400" class="connection"/>
    <line x1="700" y1="360" x2="840" y2="400" class="connection"/>
    <line x1="800" y1="360" x2="1040" y2="400" class="connection"/>
    
    <!-- Services to Shared Services -->
    <line x1="240" y1="520" x2="275" y2="550" class="connection"/>
    <line x1="440" y1="520" x2="445" y2="550" class="connection"/>
    <line x1="640" y1="520" x2="615" y2="550" class="connection"/>
    <line x1="840" y1="520" x2="785" y2="550" class="connection"/>
    
    <!-- Services to Data Layer -->
    <line x1="240" y1="520" x2="300" y2="700" class="data-flow"/>
    <line x1="440" y1="520" x2="300" y2="700" class="data-flow"/>
    <line x1="640" y1="520" x2="510" y2="700" class="data-flow"/>
    <line x1="840" y1="520" x2="510" y2="700" class="data-flow"/>
    <line x1="445" y1="630" x2="710" y2="700" class="data-flow"/>
    
    <!-- Data Layer Replication -->
    <line x1="400" y1="750" x2="420" y2="750" class="bidirectional"/>
    
    <!-- Services to External Systems -->
    <line x1="240" y1="520" x2="300" y2="870" class="connection"/>
    <line x1="440" y1="520" x2="510" y2="870" class="connection"/>
    <line x1="640" y1="520" x2="710" y2="870" class="connection"/>
    <line x1="445" y1="630" x2="910" y2="870" class="connection"/>
    
    <!-- Security Services -->
    <line x1="600" y1="300" x2="890" y2="200" class="connection"/>
    <line x1="700" y1="300" x2="1110" y2="200" class="connection"/>
  </g>
  
  <!-- Legend -->
  <g id="legend">
    <rect x="1050" y="300" width="300" height="200" fill="white" stroke="#333" stroke-width="1" rx="5"/>
    <text x="1200" y="320" class="component-title">Legend</text>
    
    <rect x="1070" y="330" width="20" height="15" class="presentation-layer"/>
    <text x="1100" y="342" class="interface-text">Presentation Layer</text>
    
    <rect x="1070" y="350" width="20" height="15" class="business-layer"/>
    <text x="1100" y="362" class="interface-text">Business Logic Layer</text>
    
    <rect x="1070" y="370" width="20" height="15" class="data-layer"/>
    <text x="1100" y="382" class="interface-text">Data Layer</text>
    
    <rect x="1070" y="390" width="20" height="15" class="external-system"/>
    <text x="1100" y="402" class="interface-text">External Systems</text>
    
    <rect x="1070" y="410" width="20" height="15" class="security-component"/>
    <text x="1100" y="422" class="interface-text">Security Components</text>
    
    <line x1="1070" y1="440" x2="1110" y2="440" class="connection"/>
    <text x="1120" y="445" class="interface-text">API Calls</text>
    
    <line x1="1070" y1="460" x2="1110" y2="460" class="data-flow"/>
    <text x="1120" y="465" class="interface-text">Data Flow</text>
    
    <line x1="1070" y1="480" x2="1110" y2="480" class="bidirectional"/>
    <text x="1120" y="485" class="interface-text">Bidirectional</text>
  </g>
  
  <!-- Compliance Notes -->
  <g id="compliance">
    <rect x="50" y="960" width="1300" height="30" fill="#fffacd" stroke="#ddd" stroke-width="1"/>
    <text x="60" y="975" class="interface-text">Compliance: PCI-DSS Level 1, GDPR, SOX, FFIEC | Security: OAuth 2.0, TLS 1.3, AES-256 | Monitoring: Real-time metrics, audit logging</text>
    <text x="60" y="985" class="interface-text">ADR Mapping: SCIB-26 (Dashboard), SCIB-27 (Fund Transfer), SCIB-28 (Spending Limits), SCIB-29 (Transaction History), SCIB-30 (OpenAPI)</text>
  </g>
</svg>